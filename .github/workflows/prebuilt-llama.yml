name: Build prebuilt llama artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: Upload artifacts to the selected tag release
        type: boolean
        default: false
      tag:
        description: Existing tag to upload assets to (workflow_dispatch only)
        required: false
        default: ""
      library_type:
        description: Type of libraries to build (static, dynamic, or both)
        type: choice
        default: "static"
        options:
          - static
          - dynamic
          - both

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-prebuilt:
    name: Linux prebuilt (${{ matrix.label }} - ${{ matrix.library_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: cpu
            suffix: cpu
            features: "mtmd"
            vulkan: false
            blas: false
            library_type: static
          - label: cpu
            suffix: cpu
            features: "mtmd"
            vulkan: false
            blas: false
            library_type: dynamic
          - label: vulkan
            suffix: vulkan
            features: vulkan,mtmd
            vulkan: true
            blas: false
            library_type: static
          - label: vulkan
            suffix: vulkan
            features: vulkan,mtmd
            vulkan: true
            blas: false
            library_type: dynamic
          - label: blas
            suffix: blas
            features: blas,mtmd
            vulkan: false
            blas: true
            library_type: static
          - label: blas
            suffix: blas
            features: blas,mtmd
            vulkan: false
            blas: true
            library_type: dynamic
    env:
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Compute asset name
        shell: bash
        run: |
          LIBRARY_TYPE="${{ matrix.library_type }}"
          echo "ASSET_NAME=llama-prebuilt-linux-${TARGET_TRIPLE}-${{ matrix.suffix }}-${LIBRARY_TYPE}.tar.gz" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake git mold \
            libclang-dev libssl-dev

      - name: Install Vulkan dependencies
        if: matrix.vulkan
        run: |
          sudo apt-get install -y libvulkan-dev glslang-tools spirv-headers
          if ! command -v glslc >/dev/null 2>&1; then
            sudo apt-get install -y glslc || sudo apt-get install -y shaderc
          fi

      - name: Install BLAS dependencies
        if: matrix.blas
        run: |
          sudo apt-get install -y libopenblas-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-linux-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-v2
          cache-targets: false
          cache-on-failure: false

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: |
          set -euo pipefail
          LIBRARY_TYPE="${{ matrix.library_type }}"
          
          # Build based on library type
          if [[ "$LIBRARY_TYPE" == "dynamic" ]]; then
            # Build only dynamic library
            if [[ -n "${{ matrix.features }}" ]]; then
              cargo build -p llama-cpp-4 \
                --release \
                --target "${TARGET_TRIPLE}" \
                --no-default-features \
                --features "${{ matrix.features }},dynamic-link"
            else
              cargo build -p llama-cpp-4 \
                --release \
                --target "${TARGET_TRIPLE}" \
                --no-default-features \
                --features "dynamic-link"
            fi
          elif [[ "$LIBRARY_TYPE" == "static" ]]; then
            # Build only static library
            if [[ -n "${{ matrix.features }}" ]]; then
              cargo build -p llama-cpp-4 \
                --release \
                --target "${TARGET_TRIPLE}" \
                --no-default-features \
                --features "${{ matrix.features }}"
            else
              cargo build -p llama-cpp-4 \
                --release \
                --target "${TARGET_TRIPLE}" \
                --no-default-features
            fi
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          mkdir -p "$ROOT/lib" "$ROOT/lib64" "$ROOT/bin"
          LIBRARY_TYPE="${{ matrix.library_type }}"

          echo "::group::All .a/.so/.dylib under target/"
          find target -type f \( -name 'lib*.a' -o -name 'lib*.so' -o -name 'lib*.dylib' \) 2>/dev/null | head -80
          echo "::endgroup::"

          # Collect any llama/ggml static/shared libraries from anywhere in target/
          while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            case "$base" in
              libllama*|libggml*|libcommon*|libmtmd*)
                # Separate static and dynamic libraries
                case "$base" in
                  *.so|*.dylib)
                    if [[ "$LIBRARY_TYPE" == "dynamic"   ]]; then
                      cp -f "$f" "$ROOT/lib/$base" 
                    fi
                    ;;
                  *.a)
                    if [[ "$LIBRARY_TYPE" == "static"   ]]; then
                      cp -f "$f" "$ROOT/lib/$base" 
                    fi
                    ;;
                esac
                ;;
            esac
          done < <(find target -type f \( -name 'lib*.a' -o -name 'lib*.so' -o -name 'lib*.dylib' \) -print0)

          echo "Collected $(find "$ROOT/lib" -type f | wc -l) libraries"
          ls -la "$ROOT/lib/" || true

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","library_type":"$LIBRARY_TYPE","sha":"${GITHUB_SHA}"}
          EOF

          tar -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}"
          
          # Check if release exists
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            # Create release if it doesn't exist
            echo "Creating release $TAG_NAME"
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Prebuilt artifacts for $TAG_NAME"
          fi
          
          # Upload asset
          gh release upload "$TAG_NAME" "$RUNNER_TEMP/$ASSET_NAME" --clobber

  windows-prebuilt:
    name: Windows prebuilt (${{ matrix.label }} - ${{ matrix.library_type }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x64 cpu
            target: x86_64-pc-windows-msvc
            suffix: cpu
            features: "mtmd"
            vulkan: false
            library_type: static
          - label: x64 cpu
            target: x86_64-pc-windows-msvc
            suffix: cpu
            features: "mtmd"
            vulkan: false
            library_type: dynamic
          - label: x64 vulkan
            target: x86_64-pc-windows-msvc
            suffix: vulkan
            features: vulkan,mtmd
            vulkan: true
            library_type: static
          - label: x64 vulkan
            target: x86_64-pc-windows-msvc
            suffix: vulkan
            features: vulkan,mtmd
            vulkan: true
            library_type: dynamic
    env:
      TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Ensure patch.exe is discoverable
        shell: pwsh
        run: |
          $gitUsrBin = Join-Path $env:ProgramFiles 'Git\usr\bin'
          if (Test-Path $gitUsrBin) {
            if (-not ($env:PATH -split ';' | Where-Object { $_ -ieq $gitUsrBin })) {
              $gitUsrBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

      - name: Compute asset name
        shell: bash
        run: |
          LIBRARY_TYPE="${{ matrix.library_type }}"
          echo "ASSET_NAME=llama-prebuilt-windows-${TARGET_TRIPLE}-${{ matrix.suffix }}-${LIBRARY_TYPE}.tar.gz" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-windows-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-v2
          cache-targets: false
          cache-on-failure: false

      - name: Install Vulkan SDK
        if: matrix.vulkan
        shell: powershell
        run: |
          choco install vulkan-sdk --yes --no-progress
          $sdk = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw 'Vulkan SDK not found' }
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        run: |
          set -euo pipefail
          LIBRARY_TYPE="${{ matrix.library_type }}"
          
          # Build based on library type
          if [[ "$LIBRARY_TYPE" == "dynamic" ]]; then
            # Build only dynamic library
            if [[ -n "${{ matrix.features }}" ]]; then
              cargo build -p llama-cpp-4 \
                --release \
                --target "${TARGET_TRIPLE}" \
                --no-default-features \
                --features "${{ matrix.features }},dynamic-link"
            else
              cargo build -p llama-cpp-4 \
                --release \
                --target "${TARGET_TRIPLE}" \
                --no-default-features \
                --features "dynamic-link"
            fi
          elif [[ "$LIBRARY_TYPE" == "static" ]]; then
            # Build only static library
            if [[ -n "${{ matrix.features }}" ]]; then
              cargo build -p llama-cpp-4 \
                --release \
                --target "${TARGET_TRIPLE}" \
                --no-default-features \
                --features "${{ matrix.features }}"
            else
              cargo build -p llama-cpp-4 \
                --release \
                --target "${TARGET_TRIPLE}" \
                --no-default-features
            fi
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          mkdir -p "$ROOT/lib" "$ROOT/lib64" "$ROOT/bin"
          LIBRARY_TYPE="${{ matrix.library_type }}"

          echo "::group::All .lib/.dll under target/"
          find target -type f \( -name '*.lib' -o -name '*.dll' \) 2>/dev/null | head -80
          echo "::endgroup::"

          # Collect llama/ggml libs from anywhere in target/
          while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            case "$base" in
              llama*|ggml*|common*|mtmd*)
                case "$base" in
                  *.lib)
                    if [[ "$LIBRARY_TYPE" == "static"   ]]; then
                      cp -f "$f" "$ROOT/lib/$base" 
                    fi
                    ;;
                  *.dll)
                    if [[ "$LIBRARY_TYPE" == "dynamic"   ]]; then
                      cp -f "$f" "$ROOT/bin/$base" 
                    fi
                    ;;
                esac ;;
            esac
          done < <(find target -type f \( -name '*.lib' -o -name '*.dll' \) -print0)

          echo "Collected $(find "$ROOT" -type f -not -name 'metadata.json' | wc -l) files"
          ls -la "$ROOT/lib/" "$ROOT/bin/" 2>/dev/null || true

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","library_type":"$LIBRARY_TYPE","sha":"${GITHUB_SHA}"}
          EOF

          tar --force-local -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}"
          
          # Check if release exists
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            # Create release if it doesn't exist
            echo "Creating release $TAG_NAME"
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Prebuilt artifacts for $TAG_NAME"
          fi
          
          # Upload asset
          gh release upload "$TAG_NAME" "$RUNNER_TEMP/$ASSET_NAME" --clobber

  macos-prebuilt:
    name: macOS prebuilt (${{ matrix.label }} - ${{ matrix.library_type }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
